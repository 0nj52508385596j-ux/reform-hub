<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#17211b" />
  <meta name="description" content="写真を撮る、描く、見せる。誰でも迷わず使えるリフォーム提案ツール" />
  <title>Reform Hub</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header simple-header">
    <div class="brand">
      <div class="brand-logo" aria-hidden="true"><span></span></div>
      <div><h1>Reform Hub</h1><p class="subtitle">撮る・描く・見せる</p></div>
    </div>
    <button id="installBtn" class="ghost hidden" type="button">ホーム画面に追加</button>
  </header>

  <main class="container simple-container">
    <section class="start-card" aria-label="はじめる">
      <p class="start-kicker">まず、ここを押してください</p>
      <label class="mega-photo-button">
        <input id="imageInput" type="file" accept="image/*" capture="environment" />
        <span class="mega-icon">📷</span>
        <strong>写真を撮る・選ぶ</strong>
        <small>現場ではここから開始</small>
      </label>
      <div class="quick-actions">
        <button id="showProjectsBtn" type="button">📁 保存した案件</button>
        <button id="helpBtn" type="button">？ 使い方</button>
      </div>
    </section>

    <section class="card workspace-card" id="workspaceSection" aria-labelledby="photoHeading">
      <div class="section-title-row top-row">
        <div><p class="step-label">STEP 1</p><h2 id="photoHeading">写真に描く</h2></div>
        <button id="customerModeBtn" class="text-button" type="button">👤 お客様に見せる</button>
      </div>
      <div class="toolbar simple-toolbar">
        <button id="undoBtn" type="button" disabled>↶ 戻す</button>
        <button id="clearDrawingBtn" type="button" disabled>描いた線を消す</button>
      </div>
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="canvas" width="1200" height="800" aria-label="現場写真への書き込みエリア"></canvas>
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">📷</div><strong>上の「写真を撮る」を押してください</strong>
        </div>
      </div>
      <div class="draw-controls big-controls">
        <label class="color-field"><span>色</span><input id="penColor" type="color" value="#ff5a1f" /></label>
        <label class="range-field"><span>線の太さ <strong id="penWidthValue">8</strong></span><input id="penWidth" type="range" min="2" max="30" value="8" /></label>
        <button id="drawToggleBtn" class="accent" type="button" disabled>✏️ 描く：ON</button>
      </div>
    </section>

    <section class="card action-card" aria-labelledby="actionHeading">
      <div class="section-title-row"><div><p class="step-label">STEP 2</p><h2 id="actionHeading">保存・共有</h2></div></div>
      <div class="action-grid simple-action-grid">
        <button id="saveProjectBtn" class="primary" type="button" disabled>💾 保存する</button>
        <button id="shareBtn" type="button" disabled>📤 送る・共有</button>
        <button id="downloadBtn" type="button" disabled>⬇️ 画像保存</button>
        <button id="aiBtn" class="ai" type="button" disabled>✨ AI提案（準備中）</button>
      </div>
      <div class="save-line"><span id="saveStatus" class="status-pill">未保存</span><span id="storageStatus">この端末に保存</span></div>
    </section>

    <details class="card project-card details-card">
      <summary>案件名やメモを入力する（必要な方だけ）</summary>
      <div class="details-body">
        <div class="section-title-row top-row"><h2 id="projectHeading">案件情報</h2><button id="newProjectBtn" class="text-button" type="button">＋ 新しい案件</button></div>
        <div class="form-grid">
          <label><span>案件名</span><input id="projectName" type="text" placeholder="例：熊本市〇〇様 フェンス提案" maxlength="60" /></label>
          <label><span>担当者</span><input id="staffName" type="text" placeholder="例：澤村" maxlength="30" /></label>
        </div>
        <label class="full-field"><span>現場メモ</span><textarea id="projectNote" rows="3" placeholder="例：目隠しフェンス、高さ1.8mを希望" maxlength="300"></textarea></label>
      </div>
    </details>

    <section class="card saved-card" id="projectsSection" aria-labelledby="savedHeading">
      <div class="section-title-row top-row"><div><p class="step-label">PROJECTS</p><h2 id="savedHeading">保存した案件</h2></div><button id="deleteAllBtn" class="danger-text" type="button">全件削除</button></div>
      <div id="projectList" class="project-list"></div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <dialog id="helpDialog"><form method="dialog" class="dialog-content"><h2>使い方は3つだけ</h2><div class="help-steps"><p><b>1</b> 写真を撮る</p><p><b>2</b> 指やペンで描く</p><p><b>3</b> 保存・共有する</p></div><button class="primary">分かりました</button></form></dialog>
  <dialog id="aiDialog"><form method="dialog" class="dialog-content"><div class="ai-badge">NEXT FEATURE</div><h2>AI提案イメージ</h2><p>写真と手描き指示から完成イメージを作る機能を準備中です。</p><label><span>AIへの指示</span><textarea id="aiPrompt" rows="4" placeholder="例：木目調の目隠しフェンスを設置"></textarea></label><div class="dialog-actions"><button id="savePromptBtn" class="primary" value="cancel" type="button">指示文を保存</button><button value="close">閉じる</button></div></form></dialog>
  <script src="app.js"></script>
</body>
</html>
