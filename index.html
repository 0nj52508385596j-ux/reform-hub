<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CAINZ365 FIELD MODE v10 β</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css?v=1000">
</head>
<body>
<header class="topbar">
  <div>
    <small>CAINZ365</small>
    <h1>FIELD MODE <b>v10 β</b></h1>
    <p>撮る・話す・描く・整理・送る</p>
  </div>
  <div class="header-actions">
    <button id="fontBtn" class="header-btn">文字：大</button>
    <button id="newBtn" class="header-btn">新規</button>
  </div>
</header>

<main>
<section class="panel">
  <h2><span>01</span>現場情報</h2>
  <div class="grid">
    <label>物件名<input id="project" placeholder="例：熊本市 ○○様邸"></label>
    <label>調査日<input id="date" type="date"></label>
  </div>
  <details>
    <summary>お客様名・担当者を確認する</summary>
    <div class="grid details-grid">
      <label>お客様名<input id="customer"></label>
      <label>担当者<input id="staff"></label>
    </div>
  </details>
</section>

<section class="panel">
  <h2><span>02</span>現場メモ</h2>
  <textarea id="memo" rows="9" placeholder="ご要望、寸法、劣化状況、注意点など"></textarea>
  <div class="actions">
    <button class="primary" id="voiceBtn">🎤 音声でメモを書く</button>
    <button id="timeBtn">＋ 時刻を追加</button>
  </div>
  <p class="hint">iPadでは、メモ欄を開いた後にキーボードのマイクを押して話します。</p>
</section>

<section class="panel">
  <h2><span>03</span>現場写真</h2>
  <label class="photoAdd">
    <input id="photoInput" type="file" accept="image/*" capture="environment" multiple>
    <strong>📷 写真を追加</strong>
    <small>撮影または写真を選択（最大20枚）</small>
  </label>
  <div id="photos" class="photos"></div>
</section>

<section class="panel">
  <h2><span>04</span>AI整理</h2>
  <div class="ai-grid">
    <button data-mode="summary">🤖 要点整理</button>
    <button data-mode="customer">👤 お客様向け</button>
    <button data-mode="contractor">👷 業者向け</button>
    <button data-mode="internal">🏢 社内日報</button>
  </div>
  <textarea id="output" rows="11" placeholder="用途別の文章がここに表示されます"></textarea>
  <div class="actions">
    <button id="copyBtn">コピー</button>
    <button class="primary" id="shareOpenBtn">📤 写真を選んで共有</button>
    <button id="pdfBtn">📄 PDF保存</button>
  </div>
</section>
</main>

<footer><span id="status">自動保存中</span><span>FIELD MODE v10 β</span></footer>

<div id="toast" class="toast"></div>

<div id="drawModal" class="modal" aria-hidden="true">
  <div class="modal-card">
    <div class="modal-head">
      <strong>写真に描く</strong>
      <button id="drawClose">閉じる</button>
    </div>
    <div class="tool-row">
      <button data-color="#ff3b30" class="color-tool active">赤</button>
      <button data-color="#007aff" class="color-tool">青</button>
      <button data-color="#ffd60a" class="color-tool">黄</button>
      <button id="thinBtn">細</button>
      <button id="thickBtn">太</button>
      <button id="undoBtn">↩ 戻す</button>
    </div>
    <canvas id="drawCanvas"></canvas>
    <div class="actions">
      <button id="resetDraw">元画像に戻す</button>
      <button class="primary" id="saveDraw">💾 保存</button>
    </div>
  </div>
</div>

<div id="shareModal" class="modal" aria-hidden="true">
  <div class="modal-card">
    <div class="modal-head">
      <strong>送る写真を確認</strong>
      <button id="shareClose">閉じる</button>
    </div>
    <p class="share-lead">送る写真だけチェックしてください。本文との添付漏れも確認します。</p>
    <div id="shareWarnings" class="warnings"></div>
    <div id="shareList" class="share-list"></div>
    <div class="actions">
      <button id="selectAllBtn">すべて選択</button>
      <button class="primary" id="shareNowBtn">📤 選んだ写真と文章を共有</button>
    </div>
  </div>
</div>

<script src="app.js?v=1000"></script>
</body>
</html>
