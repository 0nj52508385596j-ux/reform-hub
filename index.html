<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111"><meta name="apple-mobile-web-app-capable" content="yes">
<title>CAINZ365 FIELD MODE β</title>
<link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="styles.css?v=900">
</head><body>
<header><div><small>CAINZ365</small><h1>FIELD MODE <b>β</b></h1><p>現場調査を3分で整理する</p></div><button id="newBtn">新規</button></header>
<main>
<section><h2><span>01</span>現場情報</h2><div class="grid"><label>物件名<input id="project" placeholder="例：熊本市 ○○様邸"></label><label>調査日<input id="date" type="date"></label></div><details><summary>お客様名・担当者などを確認する</summary><div class="grid"><label>お客様名<input id="customer"></label><label>担当者<input id="staff"></label></div></details></section>
<section><h2><span>02</span>現場メモ</h2><textarea id="memo" rows="10" placeholder="ご要望、寸法、劣化状況、注意点、次回対応など"></textarea><div class="actions"><button class="primary" id="voiceBtn">🎤 音声でメモを書く</button><button id="timeBtn">＋ 時刻</button></div><p class="hint">iPadでは、ボタンを押した後にキーボードのマイクを押して話してください。</p></section>
<section><h2><span>03</span>現場写真</h2><label class="photoAdd"><input id="photoInput" type="file" accept="image/*" capture="environment" multiple><strong>📷 写真を追加</strong><small>撮影または選択（最大20枚）</small></label><div id="photos" class="photos"></div></section>
<section><h2><span>04</span>AI整理</h2><div class="ai"><button data-mode="summary">🤖 要点整理</button><button data-mode="customer">👤 お客様向け</button><button data-mode="contractor">👷 業者向け</button><button data-mode="internal">🏢 社内日報</button></div><textarea id="output" rows="12" placeholder="上のボタンで用途別に文章を整理します"></textarea><div class="actions"><button id="copyBtn">コピー</button><button id="shareBtn">共有</button><button class="primary" id="pdfBtn">📄 PDF保存</button></div><p class="hint">β版は端末内で文章を整理します。外部AI接続は次版で追加できます。</p></section>
<section class="future"><h2><span>05</span>AI完成イメージ</h2><button id="imageBtn">✨ 完成イメージを作る（準備中）</button></section>
</main>
<footer><span id="status">自動保存中</span><span>v9.0 β</span></footer><div id="toast"></div>
<script src="app.js?v=900"></script></body></html>
